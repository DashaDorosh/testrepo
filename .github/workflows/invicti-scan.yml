name: Invicti Scan

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: invicti/scan-cli:latest
      options: --user root
      volumes:
        - /home/runner/work/scan-results:/home/invicti/publicdata
    env:
      INVICTI_API_BASE_URL: "https://platform.invicti.com"
      INVICTI_API_TOKEN: MoQqW61R0PiAmnD-7NffOOrvn3OtvVjI5DS92w0pmq8
      INVICTI_TARGET_ID: "68c8eef3-f3da-4754-80c7-fb91ba4aa6e7"
      INVICTI_SCAN_AGENT: "CloudAgent"
      INVICTI_SCAN_PROFILE: "SQL Injection"
      INVICTI_REPORT_TEMPLATE: "Comprehensive"

    steps:
      - name: Run Invicti Scan CLI
        run: /home/invicti/scancli/ScanCLI

      - name: List scan output
        if: always()
        run: ls -la /home/invicti/publicdata/ || echo "Directory empty or missing"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invicti-scan-results
          path: /__w/scan-results/**
          if-no-files-found: ignore
          retention-days: 7